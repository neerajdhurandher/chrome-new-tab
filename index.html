<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src *; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.api-ninjas.com ">
    <title>Neeraj's new tab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="weather-div">
        <div class="weather-input-div">
            <div class="autocomplete">
                <input type="text" id="city-input" style="display: none;" type="search"
                    placeholder="enter your city name">
                <div id="cityDropdown" class="dropdown-content"></div>
            </div>
            <span id="loading_msg">getting your location weather data...</span>
        </div>
        <div class="weather-details-div" style="display:none;">
            <div class="weather-essential-data">
                <div class="half-div weather-error-info">
                    <img id="weather-error-info-icon" class="weather-error-info-icon" title="Additional weather information"
                        src="./imgs/info-icon-red.svg" />
                </div>
                <div class="weather-data-div">
                    <div class="half-div">
                        <img class="weather-icon" />
                    </div>
                    <div class="half-div weather-value-div">
                        <span class="weather-value"></span>
                        <span class="location-name"></span>
                    </div>
                    <div class="half-div weather-icons-container">
                        <div id="city_edit_icon" class="city-edit-icon">
                            <img src="./imgs/edit-icon.png" alt="">
                        </div>
                        <div id="weather_additional_info_icon" class="weather-additional-info-icon">
                            <img src="./imgs/info-icon-white.svg" alt="">
                        </div>
                    </div>
                </div>
            </div>
            <div id="weather_additional_data" class="weather-additional-data" style="display: none;">
                <div class="wad-grid">
                    <div class="wad-item wad-feels">
                        <span class="wad-label">Feels Like</span>
                        <span class="wad-value" id="wad-feels-like">—</span>
                    </div>
                    <div class="wad-item wad-humidity">
                        <img class="wad-icon" src="./imgs/humidity-icon-blue.png" alt="humidity" />
                        <span class="wad-label">Humidity</span>
                        <span class="wad-value" id="wad-humidity">—</span>
                    </div>
                    <div class="wad-item wad-wind">
                        <img class="wad-icon" src="./imgs/wind.svg" alt="wind" />
                        <span class="wad-label">Wind</span>
                        <span class="wad-value" id="wad-wind">—</span>
                    </div>
                    <div class="wad-item wad-condition">
                        <span class="wad-label">Condition</span>
                        <span class="wad-value" id="wad-condition">—</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="date-time-body">
        <div class="current_time"></div>
        <div class="current-day-date">
            <span id="day">day</span>,
            <span id="daynum">00</span>
            <span id="month">month</span>
            <span id="year">0000</span>
        </div>
    </div>

    <div class="quote-container">
        <span class="quote_p">Today is your opportunity to build the tomorrow you
            want.</span>
        <span class="quote_author_p">Ken Poirot</span>
    </div>

    <div class="greeting-div">
        <span class="greeting-h1"></span>
    </div>


    <div class="search-container">

        <div id="google-search-div-id" tabindex="0" class="search-div">
            <div id="google-search-box-id" class="search-box">
                <img class="img-logo" src="./imgs/web-search.svg" />
                <input type="search" id="google-search-input" class="input-box" placeholder="web search">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button id="google-search-btn" class="search-btn" type="submit">Search</button>
        </div>

        <div id="youtube-search-div-id" class="search-div">
            <div id="youtube-search-box-id" class="search-box">
                <img class="img-logo" src="./imgs/youtube-icon.svg" />
                <input type="search" id="youtube-search-input" class="input-box" placeholder="youtube search">
            </div>
            <button id="youtube-search-btn" class="search-btn" type="submit">Search</button>
        </div>

    </div>

    <div class="bookmark-container">
        <img class="bookmark-edit-btn" src="./imgs/edit-icon.png" alt="edit-icon">
        <div class="bookmark-div">
            <div class="bookmark-list">
            </div>
            <div class="bookmark-card add-new-bm">
                <img class="bookmark-logo" src="./imgs/plus-icon.svg" alt="logo">
                <span class="bookmark-name">add new</span>
            </div>
            <div class="bookmark-arrow-div">
                <img id="bookmark_down_arrow" class="bookmark-arrow" src="./imgs/double_down_arrow_icon.png" alt="">
                <img id="bookmark_up_arrow" class="bookmark-arrow" src="./imgs/double_up_arrow_icon.png" alt="">
                <span class="more-bookmark-btn"> > more</span>
            </div>
        </div>
    </div>

    <div id="bookmark-popup" class="overlay">
        <div class="popup">
            <a class="close">&times;</a>
            <div class="popup-content add-edit-bookmark">
                <span id="bookmark-popup-title">Add bookmark</span>
                <label for="bm-name">Name</label>
                <input id="bm-name" class="simple-input-box" autocomplete="off" type="text"
                    placeholder="Enter bookmark name here">
                <label for="bm-url">URL</label>
                <input id="bm-url" class="simple-input-box" autocomplete="off" type="search"
                    placeholder="Paste URL here">
                <input id="save-btn" class="button-class" type="button" value="Save">
                <input id="delete-btn" class="button-class" type="button" value="Delete">
                <div id="loader" class="loader" style="display: none;"></div>
                <span id="msg_text" style="font-size:large; margin-left: 40%; margin-right: 40%; display: none;">Saved
                    &#8730;</span>
            </div>
        </div>
    </div>

    <div id="more-bookmark-popup" class="overlay">
        <div class="popup">
            <a class="more-bookmark-close close">&times;</a>
            <div class="more-bookmark-popup-container popup-content">
                <h1 id="bookmark-heading">Bookmarks</h1>
            </div>
        </div>
    </div>


    <div class="neeraj-logo">
        <a href="https://neerajdhurandher.me" target="_blank">
            <img src="./neeraj-logo.png" alt="logo">
        </a>
    </div>

    <div class="feedback">
        <a href="https://forms.gle/6X8YtLKpUKtKihkt6" target="_blank">Feedback</a>
    </div>

</body>
<script type="module" src="script.js"></script>
<script type="module" src="search.js"></script>
<script type="module" src="bookmark.js"></script>

</html>
